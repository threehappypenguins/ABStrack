name: Vercel Production Deployment

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Manual deploy target'
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy web to Vercel
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy to Vercel (production)
        if: github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: false
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: apps/web

      - name: Deploy to Vercel (manual preview)
        if: github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'preview'
        id: deploy-preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: false
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web

      - name: Print deployment URL
        if: steps.deploy.outputs.preview-url != ''
        run: echo "Deployed to production ${{ steps.deploy.outputs.preview-url }}"

      - name: Print preview deployment URL
        if: steps.deploy-preview.outputs.preview-url != ''
        run: echo "Deployed preview ${{ steps.deploy-preview.outputs.preview-url }}"
