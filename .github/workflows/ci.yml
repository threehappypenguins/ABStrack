# App CI: lint, typecheck, test, build, a11y.
#
# Triggers:
# - PR comment `/ci` (exact match) on any open PR — preferred for feature → `dev` so pushes
#   after the PR is open do not burn Actions minutes.
# - pull_request targeting `main` — automatic gate for the promote-to-prod PR.
#
# Environments (required — matches the Cloud vs self-hosted split):
# - PR base `dev`  → GitHub Environment `development` (Supabase Cloud URL + publishable key)
# - PR base `main` → GitHub Environment `production`  (self-hosted URL + publishable key;
#   joins Tailscale so MagicDNS / private API hosts are reachable from the runner)
#
# issue_comment runs on the default branch (`dev`). Commit statuses are posted to the PR
# head SHA so branch protection can require context `CI`.
#
# Branch-policy gotchas (Settings → Environments → Deployment branches):
# - `development`: allow `dev` (covers `/ci` / `/infra-ci` comments; workflow ref is refs/heads/dev).
# - `production`: allow `main` (deploys) AND `refs/pull/*/merge` (CI on PRs into main). Without
#   the pull-request pattern, a `pull_request` job with `environment: production` fails the
#   environment gate before any step runs.

name: CI

on:
  issue_comment:
    types: [created]
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
  statuses: write

jobs:
  resolve:
    name: Resolve PR target environment
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.body == '/ci') ||
      github.event_name == 'pull_request'
    outputs:
      sha: ${{ steps.pr.outputs.sha }}
      repo: ${{ steps.pr.outputs.repo }}
      base: ${{ steps.pr.outputs.base }}
      github_environment: ${{ steps.pr.outputs.github_environment }}
      use_tailscale: ${{ steps.pr.outputs.use_tailscale }}
    steps:
      - name: Verify commenter has write access
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const perms = data.user?.permissions;
            const hasWriteAccess =
              perms?.admin === true ||
              perms?.maintain === true ||
              perms?.push === true ||
              ['admin', 'write'].includes(data.permission);
            if (!hasWriteAccess) {
              core.setFailed(`@${context.actor} does not have permission to trigger CI.`);
              throw new Error('Permission denied');
            }

      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Resolve PR head and target environment
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            let sha;
            let repoFullName;
            let baseRef;
            if (context.eventName === 'issue_comment') {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              if (!pr.head.repo) {
                core.setFailed('PR head repository is unavailable (fork may have been deleted or is inaccessible).');
                throw new Error('PR head repo is null');
              }
              sha = pr.head.sha;
              repoFullName = pr.head.repo.full_name;
              baseRef = pr.base.ref;
            } else {
              const pr = context.payload.pull_request;
              if (!pr.head.repo) {
                core.setFailed('PR head repository is unavailable.');
                throw new Error('PR head repo is null');
              }
              sha = pr.head.sha;
              repoFullName = pr.head.repo.full_name;
              baseRef = pr.base.ref;
            }

            let githubEnvironment;
            let useTailscale;
            if (baseRef === 'main') {
              githubEnvironment = 'production';
              useTailscale = 'true';
            } else if (baseRef === 'dev') {
              githubEnvironment = 'development';
              useTailscale = 'false';
            } else {
              core.setFailed(
                `CI only supports PRs targeting dev (development) or main (production); base was '${baseRef}'.`
              );
              throw new Error('Unsupported PR base');
            }

            core.setOutput('sha', sha);
            core.setOutput('repo', repoFullName);
            core.setOutput('base', baseRef);
            core.setOutput('github_environment', githubEnvironment);
            core.setOutput('use_tailscale', useTailscale);
            core.info(`PR base=${baseRef} → environment=${githubEnvironment} tailscale=${useTailscale}`);

  CI:
    name: Build and Tests
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.github_environment }}
    steps:
      - name: Set commit status (pending)
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ needs.resolve.outputs.sha }}',
              state: 'pending',
              context: 'CI',
              description: 'Build and tests running…',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      # Production (self-hosted) API is on the tailnet; Cloud development does not need this.
      - name: Connect to Tailscale
        if: needs.resolve.outputs.use_tailscale == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve.outputs.repo }}
          ref: ${{ needs.resolve.outputs.sha }}
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10.33.0
          run_install: false

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      # - run: pnpm dlx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="build"

      # Cache node_modules
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Validate required public Supabase env vars
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          GITHUB_ENVIRONMENT: ${{ needs.resolve.outputs.github_environment }}
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "::error::NEXT_PUBLIC_SUPABASE_URL is missing on the '${GITHUB_ENVIRONMENT}' GitHub Environment (Variables)." && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY" || (echo "::error::NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY is missing on the '${GITHUB_ENVIRONMENT}' GitHub Environment (Variables)." && exit 1)
          echo "Using ${GITHUB_ENVIRONMENT}: NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}"

      - run: pnpm install --frozen-lockfile

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      # - run: pnpm exec nx record -- echo Hello World
      - name: Packages (lint, typecheck)
        run: pnpm exec nx run-many -t lint typecheck -p @abstrack/types,@abstrack/ui,@abstrack/supabase,@abstrack/powersync

      - name: Packages (test)
        run: pnpm exec nx run-many -t test -p @abstrack/types,@abstrack/ui,@abstrack/powersync --exclude=@abstrack/supabase

      # Secret only for preset RLS integration tests; not visible to other actions/steps.
      - name: Packages (test @abstrack/supabase)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: pnpm exec nx test @abstrack/supabase

      - name: Apps (lint, typecheck)
        run: pnpm exec nx run-many -t lint typecheck --exclude=@abstrack/types,@abstrack/ui,@abstrack/supabase,@abstrack/powersync

      - name: Apps (test)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm exec nx run-many -t test --exclude=@abstrack/supabase,@abstrack/types,@abstrack/ui,@abstrack/powersync

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm exec nx run-many -t build --exclude=@abstrack/mobile

      - name: Install Playwright (Chromium — @a11y tests run on Chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Accessibility (axe-core via Playwright)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm a11y:e2e

      - name: Set commit status (final)
        if: always() && needs.resolve.outputs.sha != ''
        uses: actions/github-script@v8
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ needs.resolve.outputs.sha }}',
              state,
              context: 'CI',
              description: state === 'success' ? 'Build and tests passed' : 'Build and tests failed',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
