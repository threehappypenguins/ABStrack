name: Vercel Preview Deployment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

# Comment triggers are exact (entire body), same pattern as `/ci` and `/infra-ci`.
# Secrets:
# - VERCEL_TOKEN, VERCEL_ORG_ID — shared across apps (same Vercel team)
# - VERCEL_WEB_PROJECT_ID — user web (`apps/web`); rename from former VERCEL_PROJECT_ID
# - VERCEL_PRACTITIONER_PROJECT_ID — practitioner (`apps/practitioner`)

jobs:
  deploy-web-preview:
    name: Deploy web preview to Vercel
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/preview-web'

    steps:
      - name: Verify commenter has write access
        id: check-permission
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const perms = data.user?.permissions;
            const hasWriteAccess =
              perms?.admin === true ||
              perms?.maintain === true ||
              perms?.push === true ||
              ['admin', 'write'].includes(data.permission);
            if (!hasWriteAccess) {
              core.setFailed(`@${context.actor} does not have permission to trigger a preview deploy.`);
              throw new Error('Permission denied');
            }

      - name: React to comment
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR head info
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('sha', pr.head.sha);
            core.setOutput('repo', pr.head.repo.full_name);

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy web preview to Vercel
        id: deploy
        uses: amondnet/vercel-action@v42
        with:
          vercel-version: '54.0.0'
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: false
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
          working-directory: apps/web

      - name: Comment web preview URL on PR
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          script: |
            const body = `## Vercel Web Preview Deployment\n\n**Preview URL:** ${{ steps.deploy.outputs.preview-url }}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existingComment = comments.find(comment =>
              comment.body.includes('## Vercel Web Preview Deployment')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              });
            }

  deploy-practitioner-preview:
    name: Deploy practitioner preview to Vercel
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/preview-practitioner'

    steps:
      - name: Verify commenter has write access
        id: check-permission
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const perms = data.user?.permissions;
            const hasWriteAccess =
              perms?.admin === true ||
              perms?.maintain === true ||
              perms?.push === true ||
              ['admin', 'write'].includes(data.permission);
            if (!hasWriteAccess) {
              core.setFailed(`@${context.actor} does not have permission to trigger a preview deploy.`);
              throw new Error('Permission denied');
            }

      - name: React to comment
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR head info
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('sha', pr.head.sha);
            core.setOutput('repo', pr.head.repo.full_name);

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy practitioner preview to Vercel
        id: deploy
        uses: amondnet/vercel-action@v42
        with:
