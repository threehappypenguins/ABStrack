# Ensure packages/supabase/src/lib/database.types.ts matches the schema produced by applying
# supabase/migrations/* to a fresh local database (no Supabase Cloud secrets required).
#
# Triggers (aligned with supabase-migrations.yml / the feature→dev comment flow):
# - PR comment `/infra-ci` (exact) when the PR touches migration paths — used for PRs into `dev`
#   so ordinary pushes do not burn Actions minutes.
# - pull_request targeting `main` when migration paths change — automatic gate for promote-to-prod.
#
# On merge, supabase-migrations.yml checks types against the target database after db push
# (no bot commit). Commit status context: `infra / database-types`.

name: Supabase Database types (PR)

on:
  issue_comment:
    types: [created]
  pull_request:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - 'packages/supabase/src/lib/database.types.ts'
      - '.github/workflows/supabase-db-types-pr.yml'

permissions:
  contents: read
  issues: write
  pull-requests: read
  statuses: write

concurrency:
  group: supabase-db-types-pr-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  INFRA_STATUS_CONTEXT: infra / database-types

jobs:
  verify:
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.body == '/infra-ci') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_CLI_VERSION: 2.84.4
    steps:
      - name: Verify commenter has write access
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const perms = data.user?.permissions;
            const hasWriteAccess =
              perms?.admin === true ||
              perms?.maintain === true ||
              perms?.push === true ||
              ['admin', 'write'].includes(data.permission);
            if (!hasWriteAccess) {
              core.setFailed(`@${context.actor} does not have permission to trigger /infra-ci.`);
              throw new Error('Permission denied');
            }

      - name: Resolve PR head
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            let sha;
            let repoFullName;
            let baseRef;
            let baseSha;
            let headSha;
            if (context.eventName === 'issue_comment') {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              if (!pr.head.repo) {
                core.setFailed('PR head repository is unavailable.');
                throw new Error('PR head repo is null');
              }
              if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) {
                core.setFailed('Fork PRs cannot use /infra-ci.');
                throw new Error('Fork PR');
              }
              sha = pr.head.sha;
              repoFullName = pr.head.repo.full_name;
              baseRef = pr.base.ref;
              baseSha = pr.base.sha;
              headSha = pr.head.sha;
            } else {
              const pr = context.payload.pull_request;
              sha = pr.head.sha;
              repoFullName = pr.head.repo.full_name;
              baseRef = pr.base.ref;
              baseSha = pr.base.sha;
              headSha = pr.head.sha;
            }
            core.setOutput('sha', sha);
            core.setOutput('repo', repoFullName);
            core.setOutput('base', baseRef);

            if (context.eventName === 'issue_comment') {
              const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${baseSha}...${headSha}`,
              });
              const prefixes = [
                'supabase/migrations/',
                'packages/supabase/src/lib/database.types.ts',
                '.github/workflows/supabase-db-types-pr.yml',
              ];
              const changed = (comparison.files || []).some((f) =>
                prefixes.some((p) => f.filename === p || f.filename.startsWith(p))
              );
              core.setOutput('changed', changed ? 'true' : 'false');
            } else {
              core.setOutput('changed', 'true');
            }

      - name: Set commit status (pending)
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: 'pending',
              context: process.env.INFRA_STATUS_CONTEXT,
              description: 'Database types check starting…',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Gate path changes for comment runs
        id: gate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ "${{ steps.pr.outputs.changed }}" != "true" ]; then
            echo "::notice title=Database types skipped::No migration / types path changes in this PR."
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.gate.outputs.run == 'true'
        with:
          repository: ${{ steps.pr.outputs.repo }}
          ref: ${{ steps.pr.outputs.sha }}

      - uses: pnpm/action-setup@v6
        if: steps.gate.outputs.run == 'true'
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v6
        if: steps.gate.outputs.run == 'true'
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.run == 'true'

      - uses: supabase/setup-cli@v2
        if: steps.gate.outputs.run == 'true'
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local stack and apply migrations
        if: steps.gate.outputs.run == 'true'
        run: |
          supabase db start
          supabase db reset --yes

      - name: Check Database types match migrations
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          TYPES_PRETTIER="$GITHUB_WORKSPACE/prettier.database-types.json"
          awk '/^export type Json/{flag=1} flag' packages/supabase/src/lib/database.types.ts > /tmp/db-types.committed.ts
          supabase gen types typescript --local --schema public > /tmp/db-types.generated.ts
          pnpm exec prettier --config "$TYPES_PRETTIER" --write /tmp/db-types.committed.ts /tmp/db-types.generated.ts
          perl -0pi -e 's/^  \/\/ Allows to automatically instantiate createClient with right options\n  \/\/ instead of createClient<Database, \{ PostgrestVersion: '\''XX'\'' \}>\(URL, KEY\)\n  __InternalSupabase: \{\n    PostgrestVersion: "14\.1"\n  \}\n//ms' /tmp/db-types.committed.ts /tmp/db-types.generated.ts
          perl -0pi -e 's/\n+\z/\n/' /tmp/db-types.committed.ts /tmp/db-types.generated.ts
          diff -u /tmp/db-types.committed.ts /tmp/db-types.generated.ts

      - name: Set commit status (final)
        if: always() && steps.pr.outputs.sha != ''
        uses: actions/github-script@v8
        with:
          script: |
            const skipped = '${{ steps.gate.outputs.run }}' !== 'true';
            const jobOk = '${{ job.status }}' === 'success';
            const state = jobOk ? 'success' : 'failure';
            const description = skipped
              ? 'Skipped (no migration / types path changes)'
              : state === 'success'
                ? 'Database types match migrations'
                : 'Database types do not match migrations';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state,
              context: process.env.INFRA_STATUS_CONTEXT,
              description,
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
