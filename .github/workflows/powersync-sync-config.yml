# PowerSync Sync Streams: validate on every PR and branch push; deploy sync-config on merge.
#
# development: PowerSync Cloud, deployed via the `powersync` CLI (pull instance + deploy sync-config).
# production:  self-hosted PowerSync (journeyapps/powersync-service). The CLI does not support
#              deploying to self-hosted instances at all — it only links to an existing API for
#              a subset of read-only commands (status, validate, generate schema/token). So prod
#              deploys work differently: scp the updated sync-rules.yaml to the server over
#              Tailscale SSH, then restart the container so it picks up the new file.
#
# Requires:
# - repository secrets: POWERSYNC_ADMIN_TOKEN, POWERSYNC_INSTANCE_ID, POWERSYNC_PROJECT_ID,
#   POWERSYNC_ORG_ID (optional) — used by validate + deploy-dev against PowerSync Cloud
# - production environment secrets: TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET (shared with
#   supabase-migrations.yml), PROD_SSH_HOST (server's Tailscale MagicDNS hostname)
#
# - pull_request (same-repo only; fork PRs skip — no secrets): validate when secrets exist
# - push to dev (when paths change): validate, then deploy sync-config to PowerSync Cloud
# - push to main (when paths change): validate, then scp + restart self-hosted PowerSync
# - workflow_dispatch: validate; deploy on dev/main only when applicable secrets exist
#
# When POWERSYNC_ADMIN_TOKEN / INSTANCE_ID / PROJECT_ID are unset (fork pushes or secrets not
# configured yet), validate exits successfully without calling the CLI and deploy-dev is skipped —
# avoids noisy failures while keeping branch push + PR coverage once secrets are added.

name: PowerSync sync config

on:
  push:
    paths:
      - 'packages/powersync/sync-rules.yaml'
      - '.github/workflows/powersync-sync-config.yml'
  pull_request:
    paths:
      - 'packages/powersync/sync-rules.yaml'
      - '.github/workflows/powersync-sync-config.yml'
  workflow_dispatch:

# Pin CLI for reproducible validate/deploy; bump when you intentionally adopt a new CLI.
env:
  POWERSYNC_CLI_VERSION: 0.9.4

permissions:
  contents: read

concurrency:
  group: powersync-sync-config-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    outputs:
      powersync_ready: ${{ steps.secrets.outputs.ready }}
    env:
      PS_ADMIN_TOKEN: ${{ secrets.POWERSYNC_ADMIN_TOKEN }}
      INSTANCE_ID: ${{ secrets.POWERSYNC_INSTANCE_ID }}
      PROJECT_ID: ${{ secrets.POWERSYNC_PROJECT_ID }}
      ORG_ID: ${{ secrets.POWERSYNC_ORG_ID }}
    steps:
      - name: Check PowerSync Actions secrets
        id: secrets
        run: |
          if [ -n "${PS_ADMIN_TOKEN:-}" ] && [ -n "${INSTANCE_ID:-}" ] && [ -n "${PROJECT_ID:-}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo '::notice title=PowerSync skipped::Repository Actions secrets POWERSYNC_ADMIN_TOKEN, POWERSYNC_INSTANCE_ID, and POWERSYNC_PROJECT_ID are not all set — validate/deploy skipped. Configure them (see docs/DEV_SETUP.md) to run CI against PowerSync Cloud.'
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.secrets.outputs.ready == 'true'

      - uses: actions/setup-node@v6
        if: steps.secrets.outputs.ready == 'true'
        with:
          node-version-file: '.nvmrc'

      - name: Pull instance, overlay Sync Streams YAML, validate
        if: steps.secrets.outputs.ready == 'true'
        run: |
          set -euo pipefail
          CONFIG_DIR=$(mktemp -d)
          cd "$CONFIG_DIR"
          pull_args=(
            pull instance
            --directory=.
            --instance-id="$INSTANCE_ID"
            --project-id="$PROJECT_ID"
          )
          if [ -n "${ORG_ID:-}" ]; then pull_args+=(--org-id="$ORG_ID"); fi
          npx --yes "powersync@${POWERSYNC_CLI_VERSION}" "${pull_args[@]}"
          if [ ! -f ./service.yaml ]; then
            echo "Expected ./service.yaml after pull instance; listing $CONFIG_DIR:" >&2
            ls -la "$CONFIG_DIR" >&2
            exit 1
          fi
          cp "${GITHUB_WORKSPACE}/packages/powersync/sync-rules.yaml" ./sync-config.yaml
          validate_args=(
            validate
            --directory=.
            --instance-id="$INSTANCE_ID"
            --project-id="$PROJECT_ID"
          )
          if [ -n "${ORG_ID:-}" ]; then validate_args+=(--org-id="$ORG_ID"); fi
          npx --yes "powersync@${POWERSYNC_CLI_VERSION}" "${validate_args[@]}"

  # --- Development: PowerSync Cloud, deployed via the CLI ---
  deploy-dev:
    needs: validate
    if: |
      needs.validate.outputs.powersync_ready == 'true' &&
      needs.validate.result == 'success' &&
      github.ref == 'refs/heads/dev' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      PS_ADMIN_TOKEN: ${{ secrets.POWERSYNC_ADMIN_TOKEN }}
      INSTANCE_ID: ${{ secrets.POWERSYNC_INSTANCE_ID }}
      PROJECT_ID: ${{ secrets.POWERSYNC_PROJECT_ID }}
      ORG_ID: ${{ secrets.POWERSYNC_ORG_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Pull instance, overlay Sync Streams YAML, deploy sync-config
        run: |
          set -euo pipefail
          CONFIG_DIR=$(mktemp -d)
          cd "$CONFIG_DIR"
          pull_args=(
            pull instance
            --directory=.
            --instance-id="$INSTANCE_ID"
            --project-id="$PROJECT_ID"
          )
          if [ -n "${ORG_ID:-}" ]; then pull_args+=(--org-id="$ORG_ID"); fi
          npx --yes "powersync@${POWERSYNC_CLI_VERSION}" "${pull_args[@]}"
          if [ ! -f ./service.yaml ]; then
            echo "Expected ./service.yaml after pull instance; listing $CONFIG_DIR:" >&2
            ls -la "$CONFIG_DIR" >&2
            exit 1
          fi
          cp "${GITHUB_WORKSPACE}/packages/powersync/sync-rules.yaml" ./sync-config.yaml
          deploy_args=(
            deploy
            sync-config
            --directory=.
            --instance-id="$INSTANCE_ID"
            --project-id="$PROJECT_ID"
          )
          if [ -n "${ORG_ID:-}" ]; then deploy_args+=(--org-id="$ORG_ID"); fi
          npx --yes "powersync@${POWERSYNC_CLI_VERSION}" "${deploy_args[@]}"

  # --- Production: self-hosted PowerSync, delivered over Tailscale SSH ---
  # No CLI deploy path exists for self-hosted, so we ship the file directly and restart the
  # container ourselves. `docker compose restart` (not `down && up`) is deliberate: the sync-rules
  # file is bind-mounted, so the container already sees the new content on disk — restart just
  # needs to re-read it. `down && up` would also needlessly tear down storage-db.
  deploy-prod:
    needs: validate
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: production
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_POWERSYNC_DIR: ${{ secrets.PROD_POWERSYNC_DIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Ship sync-rules.yaml to production server
        run: |
          set -euo pipefail
          scp -o StrictHostKeyChecking=accept-new \
            packages/powersync/sync-rules.yaml \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}:${PROD_POWERSYNC_DIR}/config/sync-rules.yaml"

      - name: Restart PowerSync and verify it comes back healthy
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "POWERSYNC_DIR='${PROD_POWERSYNC_DIR}' bash -s" <<'EOF'
            set -euo pipefail
            cd "$POWERSYNC_DIR"
            docker compose restart powersync
            for i in $(seq 1 15); do
              if curl -fsS http://localhost:8080/probes/liveness >/dev/null 2>&1; then
                echo "PowerSync is back up."
                exit 0
              fi
              sleep 2
            done
            echo "::error::PowerSync did not come back healthy after restart. Recent logs:"
            docker compose logs --tail=50 powersync
            exit 1
          EOF
