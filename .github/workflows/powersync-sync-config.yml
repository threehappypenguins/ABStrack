# PowerSync Sync Streams: validate on every PR and branch push; deploy sync-config on main.
# Requires repository secrets (see docs/SUPABASE_CLOUD_DEVELOPER.md and docs/DEV_SETUP.md).
#
# Uses `powersync pull instance` (not `init cloud`) so the job directory contains the real
# `service.yaml` from PowerSync Cloud—including replication connection details. Then we replace
# `sync-config.yaml` with `packages/powersync/sync-rules.yaml` and run full `validate` /
# `deploy sync-config`. See PowerSync CLI docs: pull instance downloads service.yaml + sync-config.
#
# - pull_request (same-repo only; fork PRs skip — no secrets): validate
# - push to any branch (when paths change): validate
# - push to main: validate, then deploy sync-config
# - workflow_dispatch on main: validate + deploy; other branches: validate only

name: PowerSync sync config

on:
  push:
    paths:
      - 'packages/powersync/sync-rules.yaml'
      - '.github/workflows/powersync-sync-config.yml'
  pull_request:
    paths:
      - 'packages/powersync/sync-rules.yaml'
      - '.github/workflows/powersync-sync-config.yml'
  workflow_dispatch:

# Pin CLI for reproducible validate/deploy; bump when you intentionally adopt a new CLI.
env:
  POWERSYNC_CLI_VERSION: 0.9.4

permissions:
  contents: read

concurrency:
  group: powersync-sync-config-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    env:
      PS_ADMIN_TOKEN: ${{ secrets.POWERSYNC_ADMIN_TOKEN }}
      INSTANCE_ID: ${{ secrets.POWERSYNC_INSTANCE_ID }}
      PROJECT_ID: ${{ secrets.POWERSYNC_PROJECT_ID }}
      ORG_ID: ${{ secrets.POWERSYNC_ORG_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull Cloud instance config and apply repo Sync Streams YAML
        run: |
          set -euo pipefail
          CONFIG_DIR=$(mktemp -d)
          pull_args=(
            pull instance
            --directory="$CONFIG_DIR"
            --instance-id="$INSTANCE_ID"
            --project-id="$PROJECT_ID"
          )
          if [ -n "${ORG_ID:-}" ]; then pull_args+=(--org-id="$ORG_ID"); fi
          npx --yes "powersync@${POWERSYNC_CLI_VERSION}" "${pull_args[@]}"
          if [ ! -f "$CONFIG_DIR/service.yaml" ]; then
            echo "Expected service.yaml after pull instance; listing $CONFIG_DIR:" >&2
            ls -la "$CONFIG_DIR" >&2
            exit 1
          fi
          cp packages/powersync/sync-rules.yaml "$CONFIG_DIR/sync-config.yaml"
          echo "CONFIG_DIR=$CONFIG_DIR" >> "$GITHUB_ENV"

      - name: Validate Sync Streams (PowerSync Cloud — full validate)
        run: |
          set -euo pipefail
          validate_args=(
            validate
            --directory="$CONFIG_DIR"
            --instance-id="$INSTANCE_ID"
            --project-id="$PROJECT_ID"
          )
          if [ -n "${ORG_ID:-}" ]; then validate_args+=(--org-id="$ORG_ID"); fi
          npx --yes "powersync@${POWERSYNC_CLI_VERSION}" "${validate_args[@]}"

  deploy:
    needs: validate
    if: |
      needs.validate.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      PS_ADMIN_TOKEN: ${{ secrets.POWERSYNC_ADMIN_TOKEN }}
      INSTANCE_ID: ${{ secrets.POWERSYNC_INSTANCE_ID }}
      PROJECT_ID: ${{ secrets.POWERSYNC_PROJECT_ID }}
      ORG_ID: ${{ secrets.POWERSYNC_ORG_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull Cloud instance config and apply repo Sync Streams YAML
        run: |
          set -euo pipefail
          CONFIG_DIR=$(mktemp -d)
          pull_args=(
            pull instance
            --directory="$CONFIG_DIR"
            --instance-id="$INSTANCE_ID"
            --project-id="$PROJECT_ID"
          )
          if [ -n "${ORG_ID:-}" ]; then pull_args+=(--org-id="$ORG_ID"); fi
          npx --yes "powersync@${POWERSYNC_CLI_VERSION}" "${pull_args[@]}"
          if [ ! -f "$CONFIG_DIR/service.yaml" ]; then
            echo "Expected service.yaml after pull instance; listing $CONFIG_DIR:" >&2
            ls -la "$CONFIG_DIR" >&2
            exit 1
          fi
          cp packages/powersync/sync-rules.yaml "$CONFIG_DIR/sync-config.yaml"
          echo "CONFIG_DIR=$CONFIG_DIR" >> "$GITHUB_ENV"

      - name: Deploy sync config only (Sync Streams / rules YAML)
        run: |
          set -euo pipefail
          deploy_args=(
            deploy
            sync-config
            --directory="$CONFIG_DIR"
            --instance-id="$INSTANCE_ID"
            --project-id="$PROJECT_ID"
          )
          if [ -n "${ORG_ID:-}" ]; then deploy_args+=(--org-id="$ORG_ID"); fi
          npx --yes "powersync@${POWERSYNC_CLI_VERSION}" "${deploy_args[@]}"
